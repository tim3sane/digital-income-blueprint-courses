<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — Digital Income Blueprint</title>
    <link rel="icon" href="assets/img/logo-oficial.png" type="image/png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --accent: #c9a227; --accent-light: #e2c462; --accent-glow: rgba(201,162,39,.25);
            --dark: #0c0c0c; --dark-2: #141414; --dark-3: #1c1c1c; --dark-4: #2a2a2a;
            --text: #e8e4dc; --text-muted: #9a9488; --radius: 16px;
            --danger: #e74c3c; --success: #27ae60;
        }
        body {
            font-family: 'Inter', sans-serif; background: var(--dark); color: var(--text);
            min-height: 100vh; display: flex; align-items: center; justify-content: center;
            padding: 2rem; line-height: 1.6;
            background: radial-gradient(ellipse at 30% 20%, rgba(201,162,39,.06) 0%, transparent 50%),
                        radial-gradient(ellipse at 70% 80%, rgba(201,162,39,.04) 0%, transparent 50%), var(--dark);
        }
        a { color: var(--accent-light); text-decoration: none; }
        a:hover { color: #fff; }

        .auth-container {
            width: 100%; max-width: 440px;
        }
        .auth-logo {
            text-align: center; margin-bottom: 2.5rem;
        }
        .auth-logo img {
            width: 72px; height: 72px; border-radius: 50%; object-fit: contain;
            filter: drop-shadow(0 0 16px rgba(201,162,39,.5));
            margin-bottom: 1rem;
        }
        .auth-logo h1 {
            font-family: 'Space Grotesk', sans-serif; font-size: 1.4rem; color: #fff;
            text-shadow: 0 0 12px rgba(201,162,39,.3);
        }
        .auth-logo p { font-size: .85rem; color: var(--text-muted); margin-top: .25rem; }

        .auth-card {
            background: var(--dark-2); border: 1px solid var(--dark-4);
            border-radius: var(--radius); padding: 2.5rem; position: relative; overflow: hidden;
        }
        .auth-card::before {
            content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
            background: linear-gradient(90deg, var(--accent), var(--accent-light));
        }
        .auth-card h2 {
            font-family: 'Space Grotesk', sans-serif; font-size: 1.5rem; color: #fff;
            margin-bottom: .5rem;
        }
        .auth-card .subtitle { font-size: .88rem; color: var(--text-muted); margin-bottom: 2rem; }

        .form-group { margin-bottom: 1.25rem; }
        .form-group label {
            display: block; font-size: .82rem; font-weight: 600; color: var(--text);
            margin-bottom: .4rem;
        }
        .form-group input {
            width: 100%; padding: .85rem 1rem; border-radius: 10px;
            background: var(--dark-3); border: 1px solid var(--dark-4); color: #fff;
            font-size: .92rem; outline: none; font-family: inherit; transition: .3s;
        }
        .form-group input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(201,162,39,.1); }
        .form-group input.error { border-color: var(--danger); }
        .form-group .field-error {
            font-size: .75rem; color: var(--danger); margin-top: .3rem; display: none;
        }
        .form-group .field-error.show { display: block; }

        .form-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; }
        .form-row label { display: flex; align-items: center; gap: .4rem; font-size: .82rem; color: var(--text-muted); cursor: pointer; }
        .form-row label input { width: auto; }
        .form-row a { font-size: .82rem; }

        .pass-wrapper { position: relative; }
        .pass-toggle {
            position: absolute; right: 1rem; top: 50%; transform: translateY(-50%);
            background: none; border: none; color: var(--text-muted); cursor: pointer;
            font-size: 1.1rem; padding: 0;
        }
        .pass-toggle:hover { color: var(--accent); }

        .btn-submit {
            width: 100%; padding: 1rem; border: none; border-radius: 10px;
            background: var(--accent); color: var(--dark); font-size: 1rem;
            font-weight: 700; cursor: pointer; transition: .3s; font-family: inherit;
        }
        .btn-submit:hover { background: var(--accent-light); transform: translateY(-1px); box-shadow: 0 8px 24px var(--accent-glow); }
        .btn-submit:disabled { opacity: .6; cursor: not-allowed; transform: none; }

        .alert {
            padding: .85rem 1rem; border-radius: 10px; font-size: .85rem; margin-bottom: 1.25rem;
            display: none;
        }
        .alert.show { display: block; }
        .alert-error { background: rgba(231,76,60,.1); border: 1px solid rgba(231,76,60,.3); color: #e74c3c; }
        .alert-success { background: rgba(39,174,96,.1); border: 1px solid rgba(39,174,96,.3); color: #27ae60; }

        .auth-footer {
            text-align: center; margin-top: 1.5rem; font-size: .88rem; color: var(--text-muted);
        }

        .divider {
            display: flex; align-items: center; gap: 1rem; margin: 1.5rem 0;
            color: var(--text-muted); font-size: .8rem;
        }
        .divider::before, .divider::after {
            content: ''; flex: 1; height: 1px; background: var(--dark-4);
        }

        .social-login { display: flex; gap: .75rem; }
        .social-btn {
            flex: 1; padding: .75rem; border-radius: 10px; border: 1px solid var(--dark-4);
            background: var(--dark-3); color: var(--text); font-size: .85rem;
            font-weight: 500; cursor: pointer; transition: .3s; font-family: inherit;
            display: flex; align-items: center; justify-content: center; gap: .5rem;
        }
        .social-btn:hover { border-color: var(--accent); background: var(--dark-4); }

        .back-home {
            display: block; text-align: center; margin-top: 2rem;
            font-size: .82rem; color: var(--text-muted);
        }
        .back-home:hover { color: var(--accent); }

        @media (max-width: 480px) {
            .auth-card { padding: 1.5rem; }
            .social-login { flex-direction: column; }
        }
    </style>
</head>
<body>

<div class="auth-container">
    <div class="auth-logo">
        <a href="index.html"><img src="assets/img/logo-oficial.png" alt="Digital Income Blueprint"></a>
        <h1>Digital Income Blueprint</h1>
        <p>Dropshipping & AI Masterclass</p>
    </div>

    <div class="auth-card">
        <h2>Welcome back</h2>
        <p class="subtitle">Sign in to access your courses and profile.</p>

        <div class="alert alert-error" id="loginAlert"></div>

        <form id="loginForm" novalidate>
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" placeholder="you@example.com" autocomplete="email" required>
                <div class="field-error" id="emailError"></div>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <div class="pass-wrapper">
                    <input type="password" id="password" placeholder="Enter your password" autocomplete="current-password" required>
                    <button type="button" class="pass-toggle" id="passToggle" aria-label="Show password">👁</button>
                </div>
                <div class="field-error" id="passError"></div>
            </div>

            <div class="form-row">
                <label><input type="checkbox" id="remember"> Remember me</label>
                <a href="#">Forgot password?</a>
            </div>

            <button type="submit" class="btn-submit" id="submitBtn">Sign In</button>
        </form>

        <div class="divider">or continue with</div>

        <div class="social-login">
            <button class="social-btn" onclick="alert('Google OAuth requires backend integration. Coming soon!')">
                <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285f4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.27-4.74 3.27-8.1z"/><path fill="#34a853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#fbbc05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#ea4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
                Google
            </button>
            <button class="social-btn" onclick="alert('GitHub OAuth requires backend integration. Coming soon!')">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0 0 24 12c0-6.63-5.37-12-12-12z"/></svg>
                GitHub
            </button>
        </div>
    </div>

    <p class="auth-footer">Don't have an account? <a href="register.html">Create one for free</a></p>
    <a href="index.html" class="back-home">&larr; Back to home</a>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/config.js"></script>
<script src="js/auth.js"></script>
<script>
    // Redirect if already logged in
    if (AUTH.isLoggedIn()) window.location.href = 'profile.html';

    const form = document.getElementById('loginForm');
    const alert_ = document.getElementById('loginAlert');
    const emailInput = document.getElementById('email');
    const passInput = document.getElementById('password');

    // Password toggle
    document.getElementById('passToggle').addEventListener('click', () => {
        const type = passInput.type === 'password' ? 'text' : 'password';
        passInput.type = type;
    });

    // Real-time validation
    emailInput.addEventListener('blur', () => {
        const err = document.getElementById('emailError');
        if (emailInput.value && !AUTH.EMAIL_REGEX.test(emailInput.value)) {
            err.textContent = 'Please enter a valid email.';
            err.classList.add('show');
            emailInput.classList.add('error');
        } else {
            err.classList.remove('show');
            emailInput.classList.remove('error');
        }
    });

    form.addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = document.getElementById('submitBtn');
        btn.disabled = true;
        btn.textContent = 'Signing in...';
        alert_.classList.remove('show');

        const result = await AUTH.login(emailInput.value, passInput.value);

        if (result.ok) {
            window.location.href = 'profile.html';
        } else {
            alert_.textContent = result.error;
            alert_.classList.add('show');
            btn.disabled = false;
            btn.textContent = 'Sign In';
        }
    });
</script>

</body>
</html>
