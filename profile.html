<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile — Digital Income Blueprint</title>
    <link rel="icon" href="assets/img/logo-oficial.png" type="image/png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --accent: #c9a227; --accent-light: #e2c462; --accent-glow: rgba(201,162,39,.25);
            --dark: #0c0c0c; --dark-2: #141414; --dark-3: #1c1c1c; --dark-4: #2a2a2a;
            --text: #e8e4dc; --text-muted: #9a9488; --radius: 16px;
            --danger: #e74c3c; --success: #27ae60;
        }
        body {
            font-family: 'Inter', sans-serif; background: var(--dark); color: var(--text);
            min-height: 100vh; line-height: 1.6;
        }
        a { color: var(--accent-light); text-decoration: none; }
        a:hover { color: #fff; }

        /* Nav */
        .nav {
            position: fixed; top: 0; left: 0; right: 0; z-index: 100;
            background: rgba(12,12,12,.92); backdrop-filter: blur(14px);
            border-bottom: 1px solid rgba(201,162,39,.15);
        }
        .nav-inner {
            max-width: 1100px; margin: auto; display: flex; align-items: center;
            justify-content: space-between; padding: 1rem 1.5rem;
        }
        .nav-logo {
            font-family: 'Space Grotesk', sans-serif; font-size: 1.2rem; font-weight: 700;
            color: #fff; display: flex; align-items: center; gap: .5rem;
            text-shadow: 0 0 12px rgba(201,162,39,.3);
        }
        .nav-logo img { width: 40px; height: 40px; border-radius: 50%; object-fit: contain; filter: drop-shadow(0 0 8px rgba(201,162,39,.4)); }
        .nav-links { display: flex; gap: .75rem; list-style: none; }
        .nav-links a {
            color: var(--text-muted); font-size: .85rem; font-weight: 500;
            padding: .4rem .9rem; border-radius: 8px; border: 1px solid var(--dark-4);
            background: var(--dark-3); transition: .3s;
        }
        .nav-links a:hover { color: #fff; background: var(--accent); border-color: var(--accent); }
        .btn-logout {
            padding: .45rem 1.1rem; border-radius: 8px; border: 1px solid var(--danger);
            background: transparent; color: var(--danger); font-size: .82rem; font-weight: 600;
            cursor: pointer; transition: .3s; font-family: inherit;
        }
        .btn-logout:hover { background: var(--danger); color: #fff; }

        /* Profile Layout */
        .profile-page { max-width: 800px; margin: 0 auto; padding: 6rem 1.5rem 3rem; }
        .profile-header {
            display: flex; align-items: center; gap: 2rem; margin-bottom: 2.5rem;
            padding-bottom: 2rem; border-bottom: 1px solid var(--dark-4);
        }
        .avatar-wrapper { position: relative; flex-shrink: 0; }
        .avatar-img {
            width: 100px; height: 100px; border-radius: 50%;
            background: linear-gradient(135deg, var(--accent), var(--accent-light));
            display: flex; align-items: center; justify-content: center;
            font-size: 2.5rem; font-weight: 700; color: var(--dark);
            overflow: hidden; border: 3px solid var(--accent);
            box-shadow: 0 0 20px rgba(201,162,39,.3);
        }
        .avatar-img img { width: 100%; height: 100%; object-fit: cover; }
        .avatar-upload {
            position: absolute; bottom: 0; right: 0; width: 32px; height: 32px;
            border-radius: 50%; background: var(--accent); border: 2px solid var(--dark-2);
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; font-size: .85rem; transition: .3s;
        }
        .avatar-upload:hover { background: var(--accent-light); transform: scale(1.1); }
        .avatar-upload input { display: none; }
        .profile-info h1 { font-family: 'Space Grotesk', sans-serif; font-size: 1.6rem; color: #fff; }
        .profile-info p { color: var(--text-muted); font-size: .9rem; }
        .profile-info .member-since { font-size: .78rem; color: var(--text-muted); margin-top: .25rem; }

        /* Tabs */
        .tabs { display: flex; gap: .5rem; margin-bottom: 2rem; flex-wrap: wrap; }
        .tab {
            padding: .6rem 1.2rem; border-radius: 10px; border: 1px solid var(--dark-4);
            background: var(--dark-3); color: var(--text-muted); font-size: .85rem;
            font-weight: 500; cursor: pointer; transition: .3s; font-family: inherit;
        }
        .tab:hover { border-color: var(--accent); color: var(--text); }
        .tab.active { background: var(--accent); color: var(--dark); border-color: var(--accent); font-weight: 700; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        /* Cards */
        .settings-card {
            background: var(--dark-2); border: 1px solid var(--dark-4);
            border-radius: var(--radius); padding: 2rem; margin-bottom: 1.5rem;
        }
        .settings-card h3 {
            font-family: 'Space Grotesk', sans-serif; font-size: 1.1rem; color: #fff;
            margin-bottom: .25rem;
        }
        .settings-card .card-desc { font-size: .82rem; color: var(--text-muted); margin-bottom: 1.5rem; }

        .form-group { margin-bottom: 1.1rem; }
        .form-group label { display: block; font-size: .82rem; font-weight: 600; color: var(--text); margin-bottom: .35rem; }
        .form-group input {
            width: 100%; padding: .8rem 1rem; border-radius: 10px;
            background: var(--dark-3); border: 1px solid var(--dark-4); color: #fff;
            font-size: .9rem; outline: none; font-family: inherit; transition: .3s;
        }
        .form-group input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(201,162,39,.1); }
        .form-group input:disabled { opacity: .5; cursor: not-allowed; }
        .form-group input.error { border-color: var(--danger); }
        .field-error { font-size: .73rem; color: var(--danger); margin-top: .25rem; display: none; }
        .field-error.show { display: block; }
        .form-row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: .75rem; }

        .pass-wrapper { position: relative; }
        .pass-toggle {
            position: absolute; right: 1rem; top: 50%; transform: translateY(-50%);
            background: none; border: none; color: var(--text-muted); cursor: pointer; font-size: 1rem;
        }

        .btn-save {
            padding: .75rem 2rem; border: none; border-radius: 10px;
            background: var(--accent); color: var(--dark); font-size: .9rem;
            font-weight: 700; cursor: pointer; transition: .3s; font-family: inherit;
        }
        .btn-save:hover { background: var(--accent-light); box-shadow: 0 6px 20px var(--accent-glow); }
        .btn-save:disabled { opacity: .5; cursor: not-allowed; }

        .alert {
            padding: .75rem 1rem; border-radius: 10px; font-size: .82rem; margin-bottom: 1rem; display: none;
        }
        .alert.show { display: block; }
        .alert-error { background: rgba(231,76,60,.1); border: 1px solid rgba(231,76,60,.3); color: #e74c3c; }
        .alert-success { background: rgba(39,174,96,.1); border: 1px solid rgba(39,174,96,.3); color: #27ae60; }

        .danger-zone {
            border-color: rgba(231,76,60,.3); background: rgba(231,76,60,.03);
        }
        .danger-zone h3 { color: #e74c3c; }

        @media (max-width: 600px) {
            .profile-header { flex-direction: column; text-align: center; }
            .form-row-2 { grid-template-columns: 1fr; }
            .nav-links { display: none; }
        }
    </style>
</head>
<body>

    <nav class="nav">
        <div class="nav-inner">
            <a href="index.html" class="nav-logo">
                <img src="assets/img/logo-oficial.png" alt=""> Digital Income Blueprint
            </a>
            <ul class="nav-links">
                <li><a href="index.html#courses">Courses</a></li>
                <li><a href="index.html#blog">Blog</a></li>
                <li><a href="profile.html" style="background:var(--accent);color:var(--dark);border-color:var(--accent);">My Profile</a></li>
            </ul>
            <button class="btn-logout" onclick="AUTH.logout()">Logout</button>
        </div>
    </nav>

    <div class="profile-page">
        <!-- Header -->
        <div class="profile-header">
            <div class="avatar-wrapper">
                <div class="avatar-img" id="avatarDisplay"></div>
                <label class="avatar-upload" title="Change photo">
                    📷
                    <input type="file" id="avatarInput" accept="image/*">
                </label>
            </div>
            <div class="profile-info">
                <h1 id="displayName">Loading...</h1>
                <p id="displayEmail">loading@email.com</p>
                <p class="member-since" id="memberSince"></p>
            </div>
        </div>

        <!-- Tabs -->
        <div class="tabs">
            <button class="tab active" data-tab="personal">Personal Info</button>
            <button class="tab" data-tab="security">Security</button>
        </div>

        <!-- Personal Info Tab -->
        <div class="tab-content active" id="tab-personal">
            <div class="settings-card">
                <h3>Personal Information</h3>
                <p class="card-desc">Update your personal details here.</p>
                <div class="alert" id="profileAlert"></div>

                <form id="profileForm" novalidate>
                    <div class="form-row-2">
                        <div class="form-group">
                            <label for="pName">Full Name</label>
                            <input type="text" id="pName" autocomplete="name">
                            <div class="field-error" id="pNameError"></div>
                        </div>
                        <div class="form-group">
                            <label for="pEmail">Email</label>
                            <input type="email" id="pEmail" autocomplete="email">
                            <div class="field-error" id="pEmailError"></div>
                        </div>
                    </div>
                    <div class="form-row-2">
                        <div class="form-group">
                            <label for="pPhone">Phone</label>
                            <input type="tel" id="pPhone" placeholder="+1 234 567 890" autocomplete="tel">
                            <div class="field-error" id="pPhoneError"></div>
                        </div>
                        <div class="form-group">
                            <label for="pAddress">Address / Country</label>
                            <input type="text" id="pAddress" placeholder="Your location" autocomplete="address-level1">
                        </div>
                    </div>
                    <button type="submit" class="btn-save">Save Changes</button>
                </form>
            </div>
        </div>

        <!-- Security Tab -->
        <div class="tab-content" id="tab-security">
            <div class="settings-card">
                <h3>Change Password</h3>
                <p class="card-desc">Ensure your account is using a strong password.</p>
                <div class="alert" id="passAlert"></div>

                <form id="passForm" novalidate>
                    <div class="form-group">
                        <label for="currentPass">Current Password</label>
                        <div class="pass-wrapper">
                            <input type="password" id="currentPass" placeholder="Enter current password">
                            <button type="button" class="pass-toggle" onclick="this.previousElementSibling.type = this.previousElementSibling.type === 'password' ? 'text' : 'password'">👁</button>
                        </div>
                    </div>
                    <div class="form-row-2">
                        <div class="form-group">
                            <label for="newPass">New Password</label>
                            <div class="pass-wrapper">
                                <input type="password" id="newPass" placeholder="Min 8 chars, mixed case, number, symbol">
                                <button type="button" class="pass-toggle" onclick="this.previousElementSibling.type = this.previousElementSibling.type === 'password' ? 'text' : 'password'">👁</button>
                            </div>
                            <div class="field-error" id="newPassError"></div>
                        </div>
                        <div class="form-group">
                            <label for="confirmNewPass">Confirm New Password</label>
                            <input type="password" id="confirmNewPass" placeholder="Repeat new password">
                            <div class="field-error" id="confirmNewPassError"></div>
                        </div>
                    </div>
                    <button type="submit" class="btn-save">Update Password</button>
                </form>
            </div>

            <div class="settings-card danger-zone">
                <h3>Danger Zone</h3>
                <p class="card-desc">Irreversible actions. Please be careful.</p>
                <button class="btn-logout" onclick="if(confirm('Are you sure you want to log out?')) AUTH.logout()">
                    Log out of all sessions
                </button>
            </div>
        </div>
    </div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/config.js"></script>
<script src="js/auth.js"></script>
<script>
    // Guard: redirect if not logged in
    if (!AUTH.isLoggedInSync()) window.location.href = 'login.html';

    // Populate header
    async function renderHeader() {
        let u = null;
        try { u = await AUTH.getCurrentUser(); } catch(e) {}
        if (!u) u = AUTH.getCurrentUserSync();
        if (!u) return;
        document.getElementById('displayName').textContent = u.name || '';
        document.getElementById('displayEmail').textContent = u.email || '';
        const avatar = document.getElementById('avatarDisplay');
        const avatarSrc = u.avatar_url || u.avatar;
        if (avatarSrc) {
            avatar.innerHTML = `<img src="${AUTH._sanitize(avatarSrc)}" alt="">`;
        } else {
            avatar.textContent = (u.name || 'U')[0].toUpperCase();
        }
        const date = new Date(u.createdAt || u.created_at);
        document.getElementById('memberSince').textContent = `Member since ${date.toLocaleDateString('en-US', { month: 'long', year: 'numeric' })}`;

        // Populate form fields
        document.getElementById('pName').value = u.name || '';
        document.getElementById('pEmail').value = u.email || '';
        document.getElementById('pPhone').value = u.phone || '';
        document.getElementById('pAddress').value = u.address || '';
    }
    renderHeader();

    // Tabs
    document.querySelectorAll('.tab').forEach(tab => {
        tab.addEventListener('click', () => {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            tab.classList.add('active');
            document.getElementById('tab-' + tab.dataset.tab).classList.add('active');
        });
    });

    // Avatar upload
    document.getElementById('avatarInput').addEventListener('change', async function() {
        const file = this.files[0];
        if (!file) return;
        if (file.size > 2 * 1024 * 1024) { alert('Image must be under 2MB.'); return; }
        if (!file.type.startsWith('image/')) { alert('Please select an image file.'); return; }

        const reader = new FileReader();
        reader.onload = async (e) => {
            const result = await AUTH.updateProfile({ avatar: e.target.result });
            if (result.ok) renderHeader();
        };
        reader.readAsDataURL(file);
    });

    // Profile form
    document.getElementById('profileForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const alert_ = document.getElementById('profileAlert');
        alert_.classList.remove('show');

        const result = await AUTH.updateProfile({
            name: document.getElementById('pName').value,
            email: document.getElementById('pEmail').value,
            phone: document.getElementById('pPhone').value,
            address: document.getElementById('pAddress').value
        });

        alert_.className = 'alert show ' + (result.ok ? 'alert-success' : 'alert-error');
        alert_.textContent = result.ok ? 'Profile updated successfully!' : result.error;
        if (result.ok) renderHeader();
    });

    // Password form
    document.getElementById('passForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const alert_ = document.getElementById('passAlert');
        alert_.classList.remove('show');

        const newPass = document.getElementById('newPass').value;
        const confirm = document.getElementById('confirmNewPass').value;

        if (newPass !== confirm) {
            alert_.className = 'alert show alert-error';
            alert_.textContent = 'New passwords do not match.';
            return;
        }

        const result = await AUTH.changePassword(
            document.getElementById('currentPass').value,
            newPass
        );

        alert_.className = 'alert show ' + (result.ok ? 'alert-success' : 'alert-error');
        alert_.textContent = result.ok ? 'Password changed successfully!' : result.error;
        if (result.ok) {
            document.getElementById('currentPass').value = '';
            document.getElementById('newPass').value = '';
            document.getElementById('confirmNewPass').value = '';
        }
    });
</script>

</body>
</html>
